feature_id: 002-check-command-policy
name: check-command-policy
goal: Evaluate a proposed command and working directory against a task-scoped execution policy without executing the command.
command_shape: "swarm check-command-policy --project <path> --policy <file> --cwd <path> -- <command...>"

inputs:
  required:
    - project_root_path
    - policy_file_path
    - candidate_working_directory
    - candidate_command

policy_expectations:
  required_policy_fields:
    - allowed_roots
    - allowed_command_prefixes

  optional_policy_fields:
    - blocked_command_patterns
    - timeout_seconds
    - max_output_bytes
    - allow_network
    - allow_package_install
    - allow_git_write

required_checks:
  - name: policy_file_exists
    description: The supplied policy file exists.
  - name: policy_parses
    description: The policy YAML parses successfully.
  - name: policy_fields_valid
    description: Required policy fields are present and valid.
  - name: cwd_within_allowed_roots
    description: The proposed working directory resolves inside an allowed root.
  - name: command_matches_allowed_prefix
    description: The proposed command matches one configured allowed command prefix.
  - name: command_blocked_pattern_absent
    description: The proposed command does not match a blocked command pattern.

success_definition: |
  The policy loads successfully, the cwd is inside an allowed root, the command matches an allowed prefix, and no blocked pattern matches.

failure_definition: |
  Missing policy file.
  Invalid YAML.
  Invalid required policy fields.
  Working directory outside allowed roots.
  Command not on the allowlist.
  Command matching a blocked pattern.

required_outputs:
  - terminal_summary
  - process_exit_code
  - structured_result_object

exit_code_contract:
  success: 0
  failure: nonzero

non_goals: |
  Do not execute the proposed command.
  Do not add retries.
  Do not add background process management.
  Do not add worker orchestration.
  Do not widen scope into full task execution.

implementation_notes: |
  Keep matching semantics explicit and inspectable.
  Prefer simple path normalization and simple string matching.
  Return refusal reasons that are concrete enough for an orchestrator to act on.